name: Generar Folletos Mensuales

on:
  repository_dispatch:
    types: [generar-folletos]
  workflow_dispatch:
    inputs:
      target_month:
        description: 'Mes objetivo YYYY-MM (vacío = mes anterior automático)'
        required: false
        default: ''

jobs:
  generar:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install -r scripts/requirements.txt

      - name: Instalar Playwright + Chromium (HTML → PDF)
        run: playwright install chromium --with-deps

      - name: Generar folletos
        env:
          TARGET_MONTH: ${{ github.event.inputs.target_month || github.event.client_payload.target_month || '' }}
        run: |
          cd scripts
          python3 main.py

      - name: Commit folletos generados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add folletos/
          git diff --cached --quiet || \
            git commit -m "🗂 Folletos $(date +'%Y-%m') generados automáticamente"
          git push
