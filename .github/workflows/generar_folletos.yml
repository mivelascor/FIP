name: Generar Folletos Mensuales

on:
  repository_dispatch:
    types: [generar-folletos]
  workflow_dispatch:
    inputs:
      target_month:
        description: 'Mes objetivo YYYY-MM (vacío = mes anterior automático)'
        required: false
        default: ''

jobs:
  generar:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar LibreOffice
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libreoffice --no-install-recommends

      - name: Instalar dependencias Python
        run: pip install -r scripts/requirements.txt

      - name: Instalar Playwright + Chromium
        run: playwright install chromium --with-deps

      - name: Instalar ODBC Driver (SQL Server)
        run: |
          curl -sSL https://packages.microsoft.com/keys/microsoft.asc | sudo apt-key add -
          echo "deb [arch=amd64] https://packages.microsoft.com/ubuntu/22.04/prod jammy main" \
            | sudo tee /etc/apt/sources.list.d/mssql-release.list
          sudo apt-get update -qq
          ACCEPT_EULA=Y sudo apt-get install -y msodbcsql17 unixodbc-dev
        continue-on-error: true

      - name: Generar folletos
        env:
          SQL_CONN_STR:  ${{ secrets.SQL_CONN_STR }}
          TARGET_MONTH:  ${{ github.event.inputs.target_month || github.event.client_payload.target_month || '' }}
        run: |
          cd scripts
          # Lee comentarios desde inputs/comentarios.json si existe
          if [ -f "../inputs/comentarios.json" ]; then
            CLP=$(python3 -c "import json; d=json.load(open('../inputs/comentarios.json')); print(d.get('clp',''))")
            USD=$(python3 -c "import json; d=json.load(open('../inputs/comentarios.json')); print(d.get('usd',''))")
          else
            CLP=""
            USD=""
          fi
          python3 main.py "$CLP" "$USD"

      - name: Commit folletos generados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add folletos/ inputs/templates/
          git diff --cached --quiet || \
            git commit -m "🗂 Folletos $(date +'%Y-%m') generados automáticamente"
          git push
