<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vantrust Capital — Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');
:root{
  --bg:#090909;
  --panel:#111111;
  --panel-2:#171717;
  --border:#262626;
  --text:#f4f4f4;
  --muted:#8f8f8f;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{
  background: radial-gradient(circle at top,#1b1b1b 0%,#090909 60%);
  color:var(--text);
  font-family:'DM Sans',sans-serif;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}
.login-card{
  width:100%;
  max-width:420px;
  background:#111;
  border:1px solid var(--border);
  border-radius:24px;
  padding:48px;
}
.logo{
  font-family:'DM Serif Display',serif;
  font-size:34px;
  margin-bottom:8px;
}
.subtitle{
  color:var(--muted);
  margin-bottom:40px;
  line-height:1.7;
}
.label{
  display:block;
  margin-bottom:10px;
  font-size:12px;
  text-transform:uppercase;
  color:#bbb;
}
.input{
  width:100%;
  background:#181818;
  border:1px solid #2b2b2b;
  border-radius:12px;
  padding:16px;
  color:white;
  margin-bottom:18px;
}
.btn{
  width:100%;
  border:none;
  background:white;
  color:black;
  border-radius:12px;
  padding:16px;
  font-weight:700;
  cursor:pointer;
}
.error{
  color:#ff7b7b;
  margin-top:14px;
  display:none;
}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">Vantrust Capital</div>
  <div class="subtitle">Plataforma de generación automática de folletos financieros.</div>
  <label class="label">Contraseña</label>
  <input type="password" class="input" id="password" placeholder="Ingresa tu contraseña" />
  <button class="btn" onclick="login()">Ingresar</button>
  <div class="error" id="error">Contraseña incorrecta.</div>
</div>
<script>
const PASSWORD = "1234";
function login(){
  const pass = document.getElementById("password").value;
  if(pass === PASSWORD){
    playOk();fb.textContent="✓ Correcto";fb.className="fb ok";
    confetti({particleCount:50,spread:45,origin:{y:.65},colors:['#e8e8e8','#888','#444']});
    setTimeout(()=>location.href="menu_principal.html",700);
  }else{
    playErr();fb.textContent="Contraseña incorrecta";fb.className="fb err";
    card.classList.remove("shake");void card.offsetWidth;card.classList.add("shake");
    document.getElementById("pwd").value="";
  }
}
</script>
</body>
</html>
